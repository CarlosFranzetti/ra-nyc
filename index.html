<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#080808" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      html, body, #root { height: 100%; background: hsl(0 0% 0%); color: hsl(0 0% 100%); }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #error-display {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #dc2626;
        color: white;
        padding: 1rem;
        display: none;
        font-family: monospace;
        font-size: 12px;
        z-index: 9999;
      }
    </style>
    <script>
      // Global error handler
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        var errorDiv = document.getElementById('error-display');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = '<strong>Error:</strong> ' + (e.error?.message || e.message) + '<br><small>' + (e.error?.stack || '') + '</small>';
        }
      });

      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
        var errorDiv = document.getElementById('error-display');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML = '<strong>Promise Rejection:</strong> ' + (e.reason?.message || e.reason);
        }
      });

      console.log('Environment check:', {
        hasSupabaseUrl: !!import.meta?.env?.VITE_SUPABASE_URL,
        hasSupabaseKey: !!import.meta?.env?.VITE_SUPABASE_PUBLISHABLE_KEY
      });
    </script>
    <title>RA NYC Events</title>
    <meta name="description" content="Resident Advisor NYC events in a fast, mobile- friendly list.">
    <meta name="author" content="Lovable" />
    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/JM1ZwdcPw6bifc5hcBGh66aKnhk2/social-images/social-1769024405590-Screenshot 2026-01-16 at 3.49.19 PM.png">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/JM1ZwdcPw6bifc5hcBGh66aKnhk2/social-images/social-1769024405590-Screenshot 2026-01-16 at 3.49.19 PM.png">
    <link rel="icon" type="image/svg+xml" href="/ra-favicon.svg" />
    
  
  
  
  <meta property="og:title" content="RA NYC Events">
  <meta name="twitter:title" content="RA NYC Events">
  <meta property="og:description" content="Resident Advisor NYC events in a fast, mobile- friendly list.">
  <meta name="twitter:description" content="Resident Advisor NYC events in a fast, mobile- friendly list.">
</head>
  <body>
    <div id="error-display"></div>
    <div id="root">
      <div id="loading">
        <p>Loading RA NYC Events...</p>
        <p style="font-size: 12px; color: #666; margin-top: 1rem;">If this message persists, check the browser console</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
